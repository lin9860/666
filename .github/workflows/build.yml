name: Vinted插件Linux编译(iphoneports工具链)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y git make curl unzip build-essential

      - name: 下载 iphoneports 工具链
        run: |
          mkdir -p ~/toolchain
          cd ~/toolchain
          # 下载预编译的 iOS 交叉编译工具链
          curl -L -o toolchain.tar.xz https://github.com/iphoneports/toolchain/releases/download/20240121/iphoneports-toolchain-ubuntu-latest.tar.xz
          tar -xf toolchain.tar.xz
          echo "$HOME/toolchain/usr/bin" >> $GITHUB_PATH

      - name: 下载 iOS SDK
        run: |
          mkdir -p ~/sdks
          cd ~/sdks
          git clone --depth 1 https://github.com/xybp888/iOS-SDKs.git .
          mkdir -p ~/theos/sdks
          cp -r iPhoneOS16.5.sdk ~/theos/sdks/ 2>/dev/null || cp -r iPhoneOS15.0.sdk ~/theos/sdks/

      - name: 安装 Theos
        run: |
          git clone --depth 1 https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: 配置 Theos 使用 iphoneports 工具链
        run: |
          cat > ~/theos/makefiles/targets/Darwin/iphone_Linux.mk << 'EOF'
          ifeq ($(shell uname),Linux)
          TARGET_CC := $(HOME)/toolchain/usr/bin/clang
          TARGET_CXX := $(HOME)/toolchain/usr/bin/clang++
          TARGET_STRIP := $(HOME)/toolchain/usr/bin/strip
          TARGET_CODESIGN := $(HOME)/toolchain/usr/bin/ldid
          TARGET_CFLAGS := -target arm64-apple-ios15.0 -isysroot $(THEOS)/sdks/iPhoneOS16.5.sdk
          TARGET_LDFLAGS := -target arm64-apple-ios15.0 -isysroot $(THEOS)/sdks/iPhoneOS16.5.sdk
          endif
          EOF

      - name: 生成插件源码
        run: |
          mkdir -p vintedisoui/Resources

          cat > Makefile << 'EOF'
          TARGET := iphone:clang:latest:15.0
          INSTALL_TARGET_PROCESSES = Vinted
          ARCHS = arm64
          include $(THEOS)/makefiles/common.mk
          TWEAK_NAME = VintedIsolator
          VintedIsolator_FILES = Tweak.x
          VintedIsolator_FRAMEWORKS = UIKit Security
          include $(THEOS)/makefiles/tweak.mk
          SUBPROJECTS += vintedisoui
          include $(THEOS)/makefiles/aggregate.mk
          EOF

          cat > control << 'EOF'
          Package: com.vinted.isolator
          Name: Vinted分身隔离
          Version: 3.0.0
          Architecture: iphoneos-arm64
          Section: Tweaks
          EOF

          cat > VintedIsolator.plist << 'EOF'
          { Filter = { Bundles = ("fr.vinted.vinted"); }; }
          EOF

          cat > Tweak.x << 'TWEAK_END'
          #import <UIKit/UIKit.h>
          #import <Security/Security.h>

          #define kPrefsPath @"/var/mobile/Library/Preferences/com.vinted.isolator.plist"
          #define kSlotsBasePath @"/var/mobile/VintedSlots"

          static NSString* getSlot() {
              NSDictionary *p = [NSDictionary dictionaryWithContentsOfFile:kPrefsPath];
              NSString *s = p[@"activeSlot"];
              return s.length ? s : @"Default";
          }

          %hook UIDevice
          - (NSUUID *)identifierForVendor {
              NSString *path = [NSString stringWithFormat:@"%@/%@/idfv.txt", kSlotsBasePath, getSlot()];
              NSString *fake = [NSString stringWithContentsOfFile:path encoding:NSUTF8StringEncoding error:nil];
              return fake ? [[NSUUID alloc] initWithUUIDString:fake] : %orig;
          }
          %end

          %hook ASIdentifierManager
          - (NSUUID *)advertisingIdentifier {
              NSString *path = [NSString stringWithFormat:@"%@/%@/idfa.txt", kSlotsBasePath, getSlot()];
              NSString *fake = [NSString stringWithContentsOfFile:path encoding:NSUTF8StringEncoding error:nil];
              return fake ? [[NSUUID alloc] initWithUUIDString:fake] : %orig;
          }
          - (BOOL)isAdvertisingTrackingEnabled { return NO; }
          %end

          %ctor {
              %init;
              [[NSFileManager defaultManager] createDirectoryAtPath:kSlotsBasePath withIntermediateDirectories:YES attributes:nil error:nil];
              NSString *def = [NSString stringWithFormat:@"%@/Default", kSlotsBasePath];
              if (![[NSFileManager defaultManager] fileExistsAtPath:def]) {
                  [[NSFileManager defaultManager] createDirectoryAtPath:def withIntermediateDirectories:YES attributes:nil error:nil];
                  [@"00000000-0000-0000-0000-000000000001" writeToFile:[NSString stringWithFormat:@"%@/idfv.txt", def] atomically:YES encoding:NSUTF8StringEncoding error:nil];
                  [@"00000000-0000-0000-0000-000000000002" writeToFile:[NSString stringWithFormat:@"%@/idfa.txt", def] atomically:YES encoding:NSUTF8StringEncoding error:nil];
              }
          }
          TWEAK_END

          cat > vintedisoui/Makefile << 'EOF'
          include $(THEOS)/makefiles/common.mk
          BUNDLE_NAME = VintedIsoUI
          VintedIsoUI_FILES = RootListController.m
          VintedIsoUI_INSTALL_PATH = /Library/PreferenceBundles
          include $(THEOS)/makefiles/bundle.mk
          EOF

          cat > vintedisoui/RootListController.m << 'EOF'
          #import <Preferences/PSListController.h>
          #import <spawn.h>
          #define kPrefsPath @"/var/mobile/Library/Preferences/com.vinted.isolator.plist"
          #define kSlotsBasePath @"/var/mobile/VintedSlots"

          @interface RLC : PSListController @end
          @implementation RLC
          - (NSArray *)specifiers {
              if (!_specifiers) {
                  NSMutableArray *s = [NSMutableArray array];
                  [s addObject:[PSSpecifier groupSpecifierWithName:@"分身管理"]];
                  PSSpecifier *add = [PSSpecifier preferenceSpecifierWithName:@"新建分身" target:self set:nil get:nil detail:nil cell:PSButtonCell edit:nil];
                  add.buttonAction = @selector(newSlot);
                  [s addObject:add];
                  for (NSString *slot in [[NSFileManager defaultManager] contentsOfDirectoryAtPath:kSlotsBasePath error:nil]) {
                      if ([slot hasPrefix:@"."]) continue;
                      PSSpecifier *sp = [PSSpecifier preferenceSpecifierWithName:slot target:self set:nil get:nil detail:nil cell:PSButtonCell edit:nil];
                      sp.buttonAction = @selector(switchTo:);
                      [sp setProperty:slot forKey:@"slot"];
                      [s addObject:sp];
                  }
                  _specifiers = s;
              }
              return _specifiers;
          }
          - (void)newSlot {
              UIAlertController *a = [UIAlertController alertControllerWithTitle:@"新建分身" message:@"名称" preferredStyle:UIAlertControllerStyleAlert];
              [a addTextFieldWithConfigurationHandler:^(UITextField *f) { f.placeholder = @"名称"; }];
              [a addAction:[UIAlertAction actionWithTitle:@"创建" style:UIAlertActionStyleDefault handler:^(UIAlertAction *action) {
                  NSString *name = a.textFields.firstObject.text;
                  if (name.length) {
                      NSString *p = [NSString stringWithFormat:@"%@/%@", kSlotsBasePath, name];
                      [[NSFileManager defaultManager] createDirectoryAtPath:p withIntermediateDirectories:YES attributes:nil error:nil];
                      [self switchToSlotWithName:name];
                  }
              }]];
              [a addAction:[UIAlertAction actionWithTitle:@"取消" style:UIAlertActionStyleCancel handler:nil]];
              [self presentViewController:a animated:YES completion:nil];
          }
          - (void)switchTo:(PSSpecifier *)spec {
              [self switchToSlotWithName:[spec propertyForKey:@"slot"]];
          }
          - (void)switchToSlotWithName:(NSString *)name {
              NSMutableDictionary *p = [NSMutableDictionary dictionaryWithContentsOfFile:kPrefsPath] ?: [NSMutableDictionary dictionary];
              p[@"activeSlot"] = name;
              [p writeToFile:kPrefsPath atomically:YES];
              const char *a[] = {"killall", "-9", "Vinted", NULL};
              posix_spawn(NULL, "/usr/bin/killall", NULL, NULL, (char**)a, NULL);
              _specifiers = nil;
              [self reloadSpecifiers];
          }
          @end
          EOF

          cat > vintedisoui/Resources/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>VintedIsoUI</string>
          <key>CFBundleIdentifier</key><string>com.vinted.isolator.ui</string>
          </dict></plist>
          EOF

      - name: 编译插件
        run: |
          export THEOS=~/theos
          export PATH=$HOME/toolchain/usr/bin:$THEOS/bin:$PATH
          make package

      - name: 上传deb
        uses: actions/upload-artifact@v4
        with:
          name: VintedPlugin.deb
          path: packages/*.deb
